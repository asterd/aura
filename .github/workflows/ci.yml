name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aura
          POSTGRES_PASSWORD: aura
          POSTGRES_DB: aura_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      qdrant:
        image: qdrant/qdrant:v1.9.0
        ports: ["6333:6333"]
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports: ["9000:9000"]
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        command: server /data

    env:
      DATABASE_URL: postgresql+asyncpg://aura:aura@localhost:5432/aura_test
      REDIS_URL: redis://localhost:6379
      QDRANT_URL: http://localhost:6333
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: aura-test
      LITELLM_BASE_URL: http://localhost:4000
      JWT_SECRET: ci-test-secret-not-production
      BOOTSTRAP_TOKEN: ci-bootstrap-token
      LANGFUSE_HOST: ""
      LANGFUSE_PUBLIC_KEY: ""
      LANGFUSE_SECRET_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run DB migrations
        run: alembic upgrade head

      - name: Lint (ruff)
        run: ruff check aura/ apps/

      - name: Type check (mypy)
        run: mypy aura/ apps/ --ignore-missing-imports

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short -x

      - name: Run critical tests
        run: pytest tests/critical/ -v --tb=short

  frontend:
    name: Frontend — lint + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: node_modules/.bin/tsc --noEmit

      - name: Lint (ESLint)
        run: npx next lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
